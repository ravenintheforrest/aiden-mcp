name = "aiden-mcp"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# Custom domain attached after first deploy via:
# CF dashboard → Workers & Pages → aiden-mcp → Settings → Domains & Routes → Add custom domain → aidenmcp.ravenhoward.org
# (or via wrangler.toml routes block, but dashboard is simpler the first time)

[observability]
enabled = true

# API-drift canary: every 6 hours, log into a dedicated Fellow account and
# strict-validate every endpoint's response shape (src/canary.ts). No-ops
# unless CANARY_FELLOW_EMAIL / CANARY_FELLOW_PASSWORD secrets are set, so
# self-hosters aren't forced to configure it.
[triggers]
crons = ["0 */6 * * *"]

[placement]
mode = "smart"

# OAuth state: client registrations, auth codes, access tokens.
# Auth codes have 10min TTL, access tokens 1hr, client registrations long-lived.
# Nothing in here is a Fellow password — only short-lived JWTs Fellow itself issues.
[[kv_namespaces]]
binding = "AIDEN_OAUTH"
id = "e9be8ca2a2bf450a9f3073f337d56b9b"
